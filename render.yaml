services:
  # ── Order Service ──────────────────────────────────────────────────────────
  - type: web
    name: order-service
    runtime: docker
    dockerfilePath: ./Dockerfile.order
    dockerContext: .
    envVars:
      - key: POSTGRES_URL
        sync: false
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false
      - key: KAFKA_BOOTSTRAP_SERVERS
        sync: false
    healthCheckPath: /actuator/health

  # ── Inventory Service ──────────────────────────────────────────────────────
  - type: web
    name: inventory-service
    runtime: docker
    dockerfilePath: ./Dockerfile.inventory
    dockerContext: .
    envVars:
      - key: POSTGRES_URL
        sync: false
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false
      - key: KAFKA_BOOTSTRAP_SERVERS
        sync: false
    healthCheckPath: /actuator/health

  # ── Payment Service ────────────────────────────────────────────────────────
  - type: web
    name: payment-service
    runtime: docker
    dockerfilePath: ./Dockerfile.payment
    dockerContext: .
    envVars:
      - key: POSTGRES_URL
        sync: false
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false
      - key: KAFKA_BOOTSTRAP_SERVERS
        sync: false
    healthCheckPath: /actuator/health
