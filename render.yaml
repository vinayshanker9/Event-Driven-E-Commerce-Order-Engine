services:
  # ── Order Service ──────────────────────────────────────────────────────────
  - type: web
    name: order-service
    runtime: docker
    dockerfilePath: ./order-service/Dockerfile
    dockerContext: .
    envVars:
      - key: POSTGRES_URL
        sync: false
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false
      - key: KAFKA_BOOTSTRAP_SERVERS
        sync: false
      - key: PORT
        value: "8081"
    healthCheckPath: /actuator/health

  # ── Inventory Service ──────────────────────────────────────────────────────
  - type: web
    name: inventory-service
    runtime: docker
    dockerfilePath: ./inventory-service/Dockerfile
    dockerContext: .
    envVars:
      - key: POSTGRES_URL
        sync: false
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false
      - key: KAFKA_BOOTSTRAP_SERVERS
        sync: false
      - key: PORT
        value: "8082"
    healthCheckPath: /actuator/health

  # ── Payment Service ────────────────────────────────────────────────────────
  - type: web
    name: payment-service
    runtime: docker
    dockerfilePath: ./payment-service/Dockerfile
    dockerContext: .
    envVars:
      - key: POSTGRES_URL
        sync: false
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false
      - key: KAFKA_BOOTSTRAP_SERVERS
        sync: false
      - key: PORT
        value: "8083"
    healthCheckPath: /actuator/health
